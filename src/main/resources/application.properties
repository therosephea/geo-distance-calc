spring.application.name=geo-distance-calculator

# ==== Data source: in-memory H2 ====
spring.datasource.url=jdbc:h2:mem:postcodes;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==== JPA / Hibernate ====
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ==== Security ====
spring.security.user.name=${APP_USER:wcc}
spring.security.user.password=${APP_PASSWORD:}

# ==== Application-specific ====
app.postcodes.csv=classpath:data/ukpostcodes-sample.csv

# ==== Logging ====
logging.level.com.wcc.challenge.geodistancecalc=INFO